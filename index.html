    const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

    async function decrypt(pw) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64(DATA.salt), iterations: DATA.iterations, hash: "SHA-256" },
        baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
      );
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(DATA.iv) }, key, b64(DATA.ct));
      return new TextDecoder().decode(plain);
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("err");
      err.textContent = "";
      try {
        const html = await decrypt(document.getElementById("pw").value);
        const frame = document.createElement("iframe");
        document.body.innerHTML = "";
        document.body.appendChild(frame);
        frame.srcdoc = html;
      } catch (_) {
        err.textContent = "Onjuist wachtwoord.";
      }
    });
  </script>
